<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>OG Image Generator</title>
<style>
  body { margin: 0; background: #000; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  canvas { border: 1px solid #333; }
</style>
</head>
<body>
<canvas id="c" width="1200" height="630"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 1200, H = 630;

// Background gradient
const grad = ctx.createLinearGradient(0, 0, W, H);
grad.addColorStop(0, '#0a0a0f');
grad.addColorStop(0.5, '#12121c');
grad.addColorStop(1, '#0a0a0f');
ctx.fillStyle = grad;
ctx.fillRect(0, 0, W, H);

// Subtle grid pattern
ctx.strokeStyle = 'rgba(108, 92, 231, 0.06)';
ctx.lineWidth = 1;
for (let x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
for (let y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

// Glow circle behind logo
const glowGrad = ctx.createRadialGradient(W/2, 240, 0, W/2, 240, 300);
glowGrad.addColorStop(0, 'rgba(108, 92, 231, 0.15)');
glowGrad.addColorStop(1, 'rgba(108, 92, 231, 0)');
ctx.fillStyle = glowGrad;
ctx.fillRect(0, 0, W, H);

// Logo: "Tool" + "igans"
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.font = '700 82px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
const logoY = 220;
const toolW = ctx.measureText('Tool').width;
const igansW = ctx.measureText('igans').width;
const totalW = toolW + igansW;
const startX = (W - totalW) / 2;

ctx.fillStyle = '#e8e8f0';
ctx.fillText('Tool', startX + toolW / 2, logoY);
ctx.fillStyle = '#6c5ce7';
ctx.fillText('igans', startX + toolW + igansW / 2, logoY);

// Tagline
ctx.font = '400 26px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
ctx.fillStyle = '#8888aa';
ctx.fillText('Developer utilities, all in one place', W / 2, 300);

// Tool icons row
const tools = [
  { icon: '{ }', label: 'JSON' },
  { icon: '64', label: 'Base64' },
  { icon: '%', label: 'URL' },
  { icon: '🔑', label: 'JWT' },
  { icon: '⏱', label: 'Time' },
];
const iconSpacing = 160;
const iconsStartX = W / 2 - ((tools.length - 1) * iconSpacing) / 2;
const iconsY = 420;

tools.forEach((t, i) => {
  const x = iconsStartX + i * iconSpacing;

  // Card background
  ctx.fillStyle = '#1a1a2e';
  ctx.strokeStyle = 'rgba(108, 92, 231, 0.3)';
  ctx.lineWidth = 1;
  const rw = 110, rh = 100, rx = x - rw/2, ry = iconsY - rh/2;
  const r = 12;
  ctx.beginPath();
  ctx.moveTo(rx + r, ry);
  ctx.lineTo(rx + rw - r, ry);
  ctx.quadraticCurveTo(rx + rw, ry, rx + rw, ry + r);
  ctx.lineTo(rx + rw, ry + rh - r);
  ctx.quadraticCurveTo(rx + rw, ry + rh, rx + rw - r, ry + rh);
  ctx.lineTo(rx + r, ry + rh);
  ctx.quadraticCurveTo(rx, ry + rh, rx, ry + rh - r);
  ctx.lineTo(rx, ry + r);
  ctx.quadraticCurveTo(rx, ry, rx + r, ry);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // Icon
  ctx.font = '600 28px -apple-system, monospace';
  ctx.fillStyle = '#a29bfe';
  ctx.fillText(t.icon, x, iconsY - 12);

  // Label
  ctx.font = '500 16px -apple-system, sans-serif';
  ctx.fillStyle = '#8888aa';
  ctx.fillText(t.label, x, iconsY + 30);
});

// Bottom bar
ctx.fillStyle = '#6c5ce7';
ctx.fillRect(0, H - 4, W, 4);

// "100% Client-side" badge
ctx.font = '500 16px -apple-system, monospace, sans-serif';
ctx.fillStyle = 'rgba(108, 92, 231, 0.6)';
ctx.textAlign = 'right';
ctx.fillText('tooligans.vercel.app', W - 40, H - 26);
ctx.textAlign = 'left';
ctx.fillText('100% client-side · No data sent', 40, H - 26);

// Download link
setTimeout(() => {
  const link = document.createElement('a');
  link.download = 'og-image.png';
  link.href = canvas.toDataURL('image/png');
  link.textContent = '⬇ Download og-image.png';
  link.style.cssText = 'display:block;text-align:center;margin:20px;color:#6c5ce7;font-family:sans-serif;font-size:20px;';
  document.body.appendChild(link);
}, 100);
</script>
</body>
</html>
